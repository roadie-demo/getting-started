apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-gcp-microservice
  title: Create GCP Microservice (Golden Path)
  description: >
    Scaffold a new microservice following the organization's golden path.
    Creates a GitHub repo from a standardized blueprint with CI/CD,
    TechDocs, ArgoCD manifest, and catalog registration built in.
  tags:
    - golden-path
    - gcp
    - recommended
spec:
  owner: group:roadie-demo/solutions
  type: service

  parameters:
    - title: Service Details
      required:
        - serviceName
        - description
        - owner
      properties:
        repoHost:
          type: string
          default: github.com
          ui:widget: hidden

        gitHubOrg:
          type: string
          default: roadie-demo # TODO: Set to the customer's GitHub org
          ui:widget: hidden

        serviceName:
          title: Service Name
          type: string
          description: >
            A lowercase, hyphenated name for the service (e.g. payment-api).
            This will be used for the repo name, catalog entry, and GCP resources.
          pattern: '^[a-z][a-z0-9-]+$'
          ui:autofocus: true

        description:
          title: Description
          type: string
          description: A short description of what this service does.

        owner:
          title: Owning Team
          type: string
          description: The team responsible for this service.
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

    - title: Technical Choices
      required:
        - language
        - gcpProject
      properties:
        language:
          title: Language / Runtime
          type: string
          description: The primary language for this service.
          default: go
          enum:
            - go
            - java
            - python
            - nodejs
          enumNames:
            - Go
            - Java (Spring Boot)
            - Python (FastAPI)
            - Node.js (Express)

        gcpProject:
          title: GCP Project
          type: string
          description: The GCP project where this service will be deployed.
          ui:field: SelectFieldFromApi
          ui:options:
            path: catalog/entities
            params:
              filter: kind=Resource,spec.type=ec2-instance
            valueSelector: metadata.name
            labelTemplate: '{{ item.metadata.name }} - {{ item.metadata.description }}'

        platformDomain:
          title: Platform Domain
          type: string
          description: Which platform domain does this service belong to?
          ui:field: SelectFieldFromApi
          ui:options:
            path: catalog/entities
            params:
              filter: kind=System
            valueSelector: metadata.name
            labelTemplate: '{{ item.metadata.title }} ({{ item.metadata.name }})'

    - title: Integrations & Compliance
      properties:
        enableTechDocs:
          title: Enable TechDocs
          type: boolean
          default: true

        argoAppName:
          title: ArgoCD Application Name
          type: string
          description: >
            Pick an existing ArgoCD app or leave blank to default to the service name.
          ui:field: SearchableSelectApi
          ui:options:
            path: /catalog/entities/by-query
            params:
              filter: kind=Component,spec.type=library
            arraySelector: items
            valueSelector: metadata.name
            labelSelector: metadata.name
            title: Search ArgoCD Apps
            placeholder: Type to search or leave blank...

        pagerdutyServiceId:
          title: PagerDuty Service
          type: string
          description: Link this service to a PagerDuty service for on-call integration.
          ui:field: SelectFieldFromApi
          ui:options:
            path: proxy/pagerduty/services
            arraySelector: services
            valueSelector: id
            labelSelector: name

        repoVisibility:
          title: Repository Visibility
          type: string
          default: private
          enum:
            - private
            - public

        entityTags:
          type: array
          ui:field: EntityTagsPicker

  steps:
    - id: log-input
      name: Log template parameters
      action: debug:log
      input:
        message: >
          Creating GCP microservice '${{ parameters.serviceName }}'
          in ${{ parameters.gcpProject }} using ${{ parameters.language }}.

    - id: fetch-skeleton
      name: Fetch service skeleton
      action: fetch:template
      input:
        url: ./skeleton
        templateFileExtension: .njk
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          language: ${{ parameters.language }}
          gcpProject: ${{ parameters.gcpProject }}
          platformDomain: ${{ parameters.platformDomain }}
          argoAppName: ${{ parameters.argoAppName | default(parameters.serviceName, true) }}
          pagerdutyServiceId: ${{ parameters.pagerdutyServiceId }}
          repoSlug: ${{ parameters.gitHubOrg }}/${{ parameters.serviceName }}

    - id: fetch-techdocs
      name: Create TechDocs structure
      if: ${{ parameters.enableTechDocs }}
      action: fetch:template
      input:
        url: ./techDocs
        templateFileExtension: .njk
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          repoSlug: ${{ parameters.gitHubOrg }}/${{ parameters.serviceName }}

    - id: publish-repo
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoHost }}?owner=${{ parameters.gitHubOrg }}&repo=${{ parameters.serviceName }}
        repoVisibility: ${{ parameters.repoVisibility | default("private", true) }}
        defaultBranch: main
        title: ${{ parameters.serviceName }}
        description: ${{ parameters.description }}

    - id: register-catalog
      name: Register in Software Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-repo'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: enable-branch-protection
      name: Enable branch protection
      action: http:backstage:request
      input:
        method: PUT
        path: /proxy/github/api/repos/${{ parameters.gitHubOrg }}/${{ parameters.serviceName }}/branches/main/protection
        headers:
          content-type: application/json
        body:
          required_status_checks: null
          enforce_admins: true
          required_pull_request_reviews:
            dismiss_stale_reviews: true
            required_approving_review_count: 1
            require_last_push_approval: true
          restrictions: null
          allow_force_pushes: false
          allow_deletions: false

  output:
    links:
      - title: View Repository on GitHub
        icon: github
        url: ${{ steps['publish-repo'].output.remoteUrl }}
      - title: View in Software Catalog
        icon: catalog
        url: ${{ steps['register-catalog'].output.entityRef }}
